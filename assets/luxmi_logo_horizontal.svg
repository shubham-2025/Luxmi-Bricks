<svg width="520" height="110" viewBox="0 0 520 110" xmlns="http://www.w3.org/2000/svg">
  <title>LUXMI BRICK FIELD — Horizontal Logo</title>
  <rect width="520" height="110" fill="#F9F6F2"/>

  <!-- Icon block -->
  <rect x="18" y="12" width="80" height="80" rx="6" fill="#1C0800"/>
  <!-- Row 1 -->
  <rect x="26" y="20" width="30" height="12" rx="2" fill="#B84A1A"/>
  <rect x="59" y="20" width="30" height="12" rx="2" fill="#B84A1A"/>
  <!-- Row 2 -->
  <rect x="26" y="35" width="14" height="12" rx="2" fill="#D4622A"/>
  <rect x="43" y="35" width="30" height="12" rx="2" fill="#D4622A"/>
  <rect x="76" y="35" width="13" height="12" rx="2" fill="#D4622A"/>
  <!-- Row 3 -->
  <rect x="26" y="50" width="30" height="12" rx="2" fill="#B84A1A"/>
  <rect x="59" y="50" width="30" height="12" rx="2" fill="#B84A1A"/>
  <!-- Row 4 -->
  <rect x="26" y="65" width="14" height="12" rx="2" fill="#D4622A"/>
  <rect x="43" y="65" width="30" height="12" rx="2" fill="#D4622A"/>
  <rect x="76" y="65" width="13" height="12" rx="2" fill="#D4622A"/>
  <!-- Gold bar -->
  <rect x="18" y="88" width="80" height="4" fill="#C08030"/>

  <!-- Vertical divider -->
  <line x1="114" y1="10" x2="114" y2="100" stroke="#D0C0B0" stroke-width="0.8"/>

  <!-- LUXMI -->
  <text x="128" y="56" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#1C0800" letter-spacing="8">LUXMI</text>

  <!-- Rule -->
  <line x1="128" y1="65" x2="500" y2="65" stroke="#C08030" stroke-width="0.8"/>

  <!-- BRICK FIELD -->
  <text x="128" y="82" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="400" fill="#3A1800" letter-spacing="7">BRICK  FIELD</text>

  <!-- Hindi -->
  <text x="128" y="98" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#8A5030" letter-spacing="1">लक्ष्मी भट्ठा  ·  प्रयागराज, उत्तर प्रदेश</text>
</svg>
